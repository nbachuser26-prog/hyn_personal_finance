<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;700;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f8f9fa; --panel: #ffffff; --text: #333333; --text-muted: #888888;
            --border: #e0e0e0; --success: #4caf50; --shadow: 0 4px 25px rgba(0,0,0,0.05);
            --radius: 24px; --accent: #ff69b4; --accent-light: rgba(255,105,180,0.15);
            --font-main: 'Quicksand', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0f111a; --panel: #1a1c26; --text: #ffffff; --text-muted: #a0a0a0;
            --border: #2d303e; --shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s ease; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 1.3fr; gap: 20px; padding-bottom: 80px; }
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px 25px; background: var(--panel); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .header-top h1 { margin: 0; font-size: 1.3rem; color: var(--accent); outline: none; cursor: text; }
        .btn-icon { background: var(--accent-light); color: var(--accent); border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .btn-icon:hover { transform: rotate(90deg); background: var(--accent); color: white; }

        .section { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); }
        h2 { margin-top: 0; color: var(--text); font-size: 1.15rem; border-bottom: 2px solid var(--accent-light); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 800; }
        
        label { display: block; margin: 15px 0 6px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, button { 
            width: 100%; padding: 14px; border-radius: 14px; border: 2px solid var(--border); 
            background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 1rem;
            font-family: inherit; transition: 0.2s; -webkit-appearance: none;
        }
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        
        button { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: 800; margin-top: 15px; box-shadow: 0 6px 20px var(--accent-light); }
        button:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); margin-top: 0; padding: 8px 15px; box-shadow: none; width: auto; }
        .btn-danger { background: #ff4d4f; color: white; border: none; box-shadow: 0 4px 15px rgba(255, 77, 79, 0.2); }

        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin: 20px 0; }
        .metric-card { background: var(--bg); padding: 18px; border-radius: 18px; text-align: center; border: 2px solid transparent; }
        .m-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
        .m-val { font-size: 1.25rem; font-weight: 800; }
        
        .progress-box { margin: 22px 0; }
        .progress-bg { height: 12px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.8s ease; }

        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { text-align: left; padding: 14px 10px; border-bottom: 1px solid var(--border); }
        
        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 28px; width: 90%; max-width: 420px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .chart-container { height: 250px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="settings-modal" onclick="if(event.target.id==='settings-modal') closeSettings()">
    <div class="modal-content">
        <h2 style="border:none">⚙️ Thiết lập</h2>
        <label>Chế độ hiển thị:</label>
        <select id="set-theme" onchange="updateSettingsLocal()">
            <option value="system">Auto (Hệ thống)</option>
            <option value="light">Sáng (Light)</option>
            <option value="dark">Tối (Dark)</option>
        </select>
        <label>Màu nhấn chủ đạo:</label>
        <select id="set-color" onchange="updateSettingsLocal()">
            <option value="pink">🌸 Pastel Pink</option>
            <option value="purple">🔮 Pastel Purple</option>
            <option value="blue">🌊 Pastel Blue</option>
            <option value="red">🍑 Pastel Red</option>
        </select>
        <label>Font chữ:</label>
        <select id="set-font" onchange="updateSettingsLocal()">
            <option value="'Quicksand', sans-serif">Quicksand</option>
            <option value="'Nunito', sans-serif">Nunito</option>
            <option value="'Comfortaa', sans-serif">Comfortaa</option>
            <option value="system-ui">Hệ thống</option>
        </select>
        <button onclick="closeSettings()" style="margin-top:25px">Hoàn tất</button>
    </div>
</div>

<div class="container">
    <div class="header-top" style="grid-column: 1 / -1;">
        <h1 id="app-title" contenteditable="true" onblur="updateSettingsLocal()">🌸 Tài chính Cá nhân</h1>
        <button class="btn-icon" onclick="document.getElementById('settings-modal').style.display='flex'">⚙️</button>
    </div>

    <div>
        <div class="section">
            <h2>💰 Nguồn Thu <button class="btn-outline btn-small" onclick="addIncomeField()">+ Thêm</button></h2>
            <div id="income-inputs"></div>
            <button onclick="sync()">💾 Lưu thu nhập</button>
        </div>

        <div class="section">
            <h2>✍️ Chi tiêu mới</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <div><label>Ngày:</label><input type="date" id="tx-date"></div>
                <div><label>Số tiền:</label><input type="number" id="tx-amt" inputmode="numeric"></div>
            </div>
            <label>Hạng mục:</label>
            <select id="tx-cat">
                <optgroup label="Thiết yếu (50%)">
                    <option value="🍲 Ăn uống|Thiết yếu">🍲 Ăn uống hàng ngày</option>
                    <option value="🪥 Đồ Skincare/Vệ sinh|Thiết yếu">🪥 Đồ Skincare / Vệ sinh</option>
                    <option value="⛽ Đi lại/Xăng|Thiết yếu">⛽ Đi lại / Xăng xe</option>
                </optgroup>
                <optgroup label="Cá nhân (30%)">
                    <option value="☕ Cafe/Trà sữa|Cá nhân">☕ Cafe / Trà sữa</option>
                    <option value="🎮 Hẹn hò/Chơi|Cá nhân">🍻 Đi chơi / Hẹn hò</option>
                    <option value="🎁 Hoa tươi/Quà tặng|Cá nhân">🎁 Hoa tươi / Quà tặng</option>
                    <option value="👗 Mua sắm/Quần áo|Cá nhân">👗 Mua sắm / Quần áo</option>
                </optgroup>
                <option value="🔄 Khác|Khác">🔄 Các khoản khác</option>
            </select>
            <label>Ghi chú:</label>
            <input type="text" id="tx-note" placeholder="...">
            <button onclick="addTransaction()">🚀 Ghi sổ ngay</button>
        </div>
    </div>

    <div>
        <div class="section">
            <h2>📊 Budget Tháng <input type="month" id="view-month" onchange="renderUI()" style="width:auto; padding:5px; border:none; background:transparent; font-weight:800; cursor:pointer"></h2>
            <div style="margin-bottom:15px"><label>🎯 Next Payday:</label><input type="date" id="next-payday" onchange="updateSettingsLocal()"></div>
            
            <div class="metric-grid">
                <div class="metric-card">
                    <div class="m-title">Khả dụng (80%)</div>
                    <div class="m-val" id="val-avail" style="color:var(--accent)">0 đ</div>
                </div>
                <div class="metric-card">
                    <div class="m-title" id="burn-title">Hạn mức / ngày</div>
                    <div class="m-val" id="val-daily">0 đ</div>
                </div>
            </div>

            <div class="progress-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem"><span>🏠 Thiết yếu</span><span id="txt-needs">0/0</span></div>
                <div class="progress-bg"><div id="bar-needs" class="progress-fill" style="background:#2196f3"></div></div>
            </div>
            <div class="progress-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem"><span>👑 Cá nhân</span><span id="txt-wants">0/0</span></div>
                <div class="progress-bg"><div id="bar-wants" class="progress-fill" style="background:#ff9800"></div></div>
            </div>
            <div class="metric-card" style="border:1px solid var(--success); background:rgba(76,175,80,0.05); margin-top:15px">
                <div class="m-title" style="color:var(--success)">💎 Tích lũy & Tiết kiệm (20%): <span id="val-invest">0 đ</span></div>
            </div>
        </div>

        <div class="section">
            <h2>📈 Tổng quan năm <span id="year-label">2026</span></h2>
            <div class="chart-container"><canvas id="yearChart"></canvas></div>
        </div>

        <div class="section">
            <h2>📋 Sao kê tháng <button class="btn-outline btn-small btn-danger" style="color:white" onclick="resetAll()">Xóa hết</button></h2>
            <div style="max-height:400px; overflow-y:auto">
                <table><tbody id="tx-history"></tbody></table>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwmv_pzJ6Q9Md_eAxtnQDhI9G6OD9j2eSz8gBbhGCueyyD6wS8CgnuZiNFv2pV6LkedqQ/exec";
    let state = { incomes: {}, transactions: [], settings: { theme: 'system', color: 'pink', font: 'Quicksand', title: '🌸 Tài chính Cá nhân', paydays: {} } };
    let myChart = null;

    const COLORS = {
        pink: { hex: '#ff69b4', light: 'rgba(255,105,180,0.15)' },
        purple: { hex: '#9d50bb', light: 'rgba(157,80,187,0.15)' },
        blue: { hex: '#2193b0', light: 'rgba(33,147,176,0.15)' },
        red: { hex: '#ff4b2b', light: 'rgba(255,75,43,0.15)' }
    };

    // --- ⚡ SPEED OPTIMIZATION: LOAD LOCAL FIRST ---
    function fastLoad() {
        const local = localStorage.getItem('finance_cache');
        if (local) {
            state = JSON.parse(local);
            applySettingsUI();
            renderIncomeInputs();
            renderUI();
        }
    }

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            const cloudData = await res.json();
            if (cloudData.transactions) {
                state = cloudData;
                if (!state.settings) state.settings = { theme: 'system', color: 'pink', font: 'Quicksand', title: '🌸 Tài chính Cá nhân', paydays: {} };
                localStorage.setItem('finance_cache', JSON.stringify(state));
                applySettingsUI();
                renderIncomeInputs();
                renderUI();
            }
        } catch (e) {
            console.log("Offline Mode");
        }
    }

    async function sync() {
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(state) });
        } catch (e) {
            console.log("Sync Error");
        }
    }

    // --- UI SETTINGS ---
    function applySettingsUI() {
        const s = state.settings;
        document.documentElement.setAttribute('data-theme', s.theme === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : s.theme);
        const root = document.documentElement;
        root.style.setProperty('--accent', COLORS[s.color].hex);
        root.style.setProperty('--accent-light', COLORS[s.color].light);
        root.style.setProperty('--font-main', s.font.includes(',') ? s.font : `'${s.font}', sans-serif`);
        document.getElementById('app-title').innerText = s.title;
        document.getElementById('set-theme').value = s.theme;
        document.getElementById('set-color').value = s.color;
        document.getElementById('set-font').value = s.font;
    }

    function updateSettingsLocal() {
        state.settings.theme = document.getElementById('set-theme').value;
        state.settings.color = document.getElementById('set-color').value;
        state.settings.font = document.getElementById('set-font').value;
        state.settings.title = document.getElementById('app-title').innerText;
        const m = document.getElementById('view-month').value;
        state.settings.paydays[m] = document.getElementById('next-payday').value;
        applySettingsUI();
        renderUI();
        localStorage.setItem('finance_cache', JSON.stringify(state));
        sync();
    }

    function closeSettings() { document.getElementById('settings-modal').style.display = 'none'; }

    // --- INCOME ---
    function renderIncomeInputs() {
        const div = document.getElementById('income-inputs');
        div.innerHTML = '';
        if (Object.keys(state.incomes).length === 0) state.incomes = {"Trợ cấp": 0};
        for (let k in state.incomes) {
            div.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:8px">
                <input type="text" value="${k}" onblur="renameInc('${k}', this.value)" style="flex:1; border:none; background:transparent; font-weight:bold">
                <input type="number" value="${state.incomes[k]}" onblur="updateIncValue('${k}', this.value)" style="flex:1" inputmode="numeric">
                <button onclick="deleteInc('${k}')" style="width:40px; margin:0; background:#ff4d4f; padding:0; border-radius:10px;">×</button>
            </div>`;
        }
    }
    function addIncomeField() { const n = prompt("Tên nguồn thu:"); if(n) { state.incomes[n] = 0; renderIncomeInputs(); localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); } }
    function deleteInc(k) { delete state.incomes[k]; renderIncomeInputs(); renderUI(); localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); }
    function renameInc(oldK, newK) { if(oldK !== newK) { state.incomes[newK] = state.incomes[oldK]; delete state.incomes[oldK]; localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); } }
    function updateIncValue(k, v) { state.incomes[k] = parseFloat(v) || 0; renderUI(); localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); }

    // --- TRANSACTIONS ---
    function addTransaction() {
        const amt = parseFloat(document.getElementById('tx-amt').value);
        const date = document.getElementById('tx-date').value;
        const [cat, bucket] = document.getElementById('tx-cat').value.split('|');
        if (!amt || !date) return;
        state.transactions.push({ id: Date.now(), amt, date, cat, bucket, note: document.getElementById('tx-note').value });
        document.getElementById('tx-amt').value = '';
        document.getElementById('tx-note').value = '';
        renderUI(); 
        localStorage.setItem('finance_cache', JSON.stringify(state)); 
        sync();
    }
    function deleteTx(id) { state.transactions = state.transactions.filter(t => t.id !== id); renderUI(); localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); }
    function resetAll() { if(confirm("Xóa hết?")) { state.transactions = []; renderUI(); localStorage.setItem('finance_cache', JSON.stringify(state)); sync(); } }

    // --- RENDER ---
    function renderUI() {
        const m = document.getElementById('view-month').value;
        const monthTx = state.transactions.filter(t => t.date.startsWith(m));
        const totalInc = Object.values(state.incomes).reduce((a,b)=>a+b, 0);
        let sNeeds = 0, sWants = 0, sOther = 0;
        
        monthTx.forEach(t => { 
            if(t.bucket==='Thiết yếu') sNeeds+=t.amt; 
            else if(t.bucket==='Cá nhân') sWants+=t.amt; 
            else sOther+=t.amt; 
        });

        const avail = (totalInc * 0.8) - (sNeeds + sWants + sOther);
        const payday = state.settings.paydays[m] || new Date(m.split('-')[0], m.split('-')[1], 0).toISOString().split('T')[0];
        document.getElementById('next-payday').value = payday;
        
        const days = Math.ceil((new Date(payday) - new Date()) / 86400000) || 1;
        document.getElementById('val-avail').innerText = avail.toLocaleString() + ' đ';
        document.getElementById('val-daily').innerText = Math.max(0, Math.floor(avail/(days>0?days:1)/1000)*1000).toLocaleString() + ' đ';
        document.getElementById('burn-title').innerText = `Hạn mức (Còn ${days} ngày)`;
        document.getElementById('txt-needs').innerText = `${sNeeds.toLocaleString()} / ${(totalInc*0.5).toLocaleString()}`;
        document.getElementById('bar-needs').style.width = Math.min(100, (sNeeds/(totalInc*0.5||1))*100) + '%';
        document.getElementById('txt-wants').innerText = `${sWants.toLocaleString()} / ${(totalInc*0.3).toLocaleString()}`;
        document.getElementById('bar-wants').style.width = Math.min(100, (sWants/(totalInc*0.3||1))*100) + '%';
        document.getElementById('val-invest').innerText = (totalInc*0.2).toLocaleString() + ' đ';

        const history = document.getElementById('tx-history');
        history.innerHTML = '';
        monthTx.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t => {
            history.innerHTML += `<tr>
                <td style="font-weight:800">${t.date.split('-')[2]}</td>
                <td>${t.cat.split(' ')[0]} <br><small>${t.note}</small></td>
                <td style="text-align:right"><b>${t.amt.toLocaleString()}</b> <button onclick="deleteTx(${t.id})" style="width:auto; margin:0; padding:4px 8px; background:none; color:red; box-shadow:none; font-size:1.2rem;">×</button></td>
            </tr>`;
        });
        renderChart(m.split('-')[0]);
    }

    function renderChart(year) {
        document.getElementById('year-label').innerText = year;
        const ctx = document.getElementById('yearChart').getContext('2d');
        const months = Array.from({length: 12}, (_, i) => `${year}-${String(i+1).padStart(2, '0')}`);
        const data = months.map(m => state.transactions.filter(t => t.date.startsWith(m)).reduce((a,b)=>a+b.amt, 0));
        
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['T1','T2','T3','T4','T5','T6','T7','T8','T9','T10','T11','T12'], datasets: [{ label: 'Chi tiêu', data: data, backgroundColor: COLORS[state.settings.color].hex, borderRadius: 8 }] },
            options: { maintainAspectRatio: false, scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }, plugins: { legend: { display: false } } }
        });
    }

    window.onload = () => {
        document.getElementById('view-month').value = new Date().toISOString().substring(0, 7);
        document.getElementById('tx-date').value = new Date().toISOString().split('T')[0];
        fastLoad();
        loadData();
    };
</script>
</body>
</html>
