<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance App</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@400;700;800&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f9fa; --panel: #ffffff; --text: #333333; --text-muted: #888888;
            --border: #e0e0e0; --success: #4caf50; --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --radius: 24px; --accent: #ff69b4; --accent-light: #ffe4e1;
            --font-main: 'Quicksand', sans-serif;
        }
        [data-theme="dark"] {
            --bg: #121212; --panel: #1e1e1e; --text: #ffffff; --text-muted: #aaaaaa;
            --border: #333333; --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        body { font-family: var(--font-main); background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.4s; }
        .container { max-width: 1000px; margin: auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; padding-bottom: 80px;}
        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
        
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 15px 25px; background: var(--panel); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); }
        .header-top h1 { margin: 0; font-size: 1.3rem; color: var(--accent); outline: none; cursor: text; }

        .section { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: var(--radius); margin-bottom: 20px; box-shadow: var(--shadow); }
        h2 { margin-top: 0; color: var(--text); font-size: 1.1rem; border-bottom: 2px solid var(--accent-light); padding-bottom: 12px; display: flex; justify-content: space-between; align-items: center;}
        
        label { display: block; margin: 15px 0 5px; font-size: 0.85rem; font-weight: 700; color: var(--text-muted); }
        input, select, button { 
            width: 100%; padding: 14px; border-radius: 14px; border: 2px solid var(--border); 
            background: var(--bg); color: var(--text); box-sizing: border-box; font-size: 1rem;
            font-family: inherit; transition: 0.3s; -webkit-appearance: none;
        }
        input:focus { outline: none; border-color: var(--accent); background: var(--panel); }
        
        button { cursor: pointer; background: var(--accent); color: white; border: none; font-weight: 800; margin-top: 15px; box-shadow: 0 6px 15px var(--accent-light); }
        button:active { transform: scale(0.96); }
        .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); margin-top: 0; padding: 6px 12px; box-shadow: none; width: auto;}
        .btn-danger { background: #ff4d4f; box-shadow: 0 4px 12px rgba(255,77,79,0.2); }

        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        .metric-card { background: var(--bg); padding: 18px; border-radius: 18px; text-align: center; border: 1px solid var(--border); }
        .m-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; }
        .m-val { font-size: 1.2rem; font-weight: 800; }
        
        .progress-bg { height: 12px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; transition: 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); background: var(--accent); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        
        /* SETTINGS MODAL */
        #settings-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        #settings-modal.show { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--panel); padding: 30px; border-radius: var(--radius); width: 90%; max-width: 380px; box-shadow: var(--shadow); }

        #toast {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #333; color: #fff; padding: 12px 25px; border-radius: 50px;
            font-weight: bold; font-size: 0.9rem; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 2000;
        }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div id="toast">☁️ Đang đồng bộ...</div>

<div id="settings-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="border:none">⚙️ Thiết lập giao diện</h2>
        <label>Chế độ hiển thị:</label>
        <select id="set-theme" onchange="updateConfig()">
            <option value="system">Auto (Theo máy)</option>
            <option value="light">Sáng (Light)</option>
            <option value="dark">Tối (Dark)</option>
        </select>
        
        <label>Tông màu Pastel:</label>
        <select id="set-color" onchange="updateConfig()">
            <option value="pink">🌸 Pastel Pink</option>
            <option value="purple">🔮 Pastel Purple</option>
            <option value="blue">💎 Pastel Blue</option>
            <option value="red">🍎 Pastel Red</option>
        </select>

        <label>Font chữ nịnh mắt:</label>
        <select id="set-font" onchange="updateConfig()">
            <option value="'Quicksand', sans-serif">Quicksand (Tròn trịa)</option>
            <option value="'Nunito', sans-serif">Nunito (Hiện đại)</option>
            <option value="'Comfortaa', sans-serif">Comfortaa (Cute)</option>
            <option value="system-ui">Mặc định hệ thống</option>
        </select>
        <button onclick="closeModal(null)" style="margin-top:20px">Hoàn tất</button>
    </div>
</div>

<div class="container">
    <div class="header-top" style="grid-column: 1 / -1;">
        <h1 id="app-title" contenteditable="true" onblur="updateConfig()">🌸 Tài chính Cá nhân</h1>
        <button onclick="openModal()" style="width:45px; height:45px; border-radius:50%; margin:0; padding:0; background:var(--accent-light); color:var(--accent); font-size:1.2rem;">⚙️</button>
    </div>

    <div>
        <div class="section">
            <h2>💰 Nguồn thu <button class="btn-outline" onclick="addIncomeField()">+ Thêm</button></h2>
            <div id="income-list"></div>
            <button onclick="saveIncomes()">💾 Lưu thu nhập</button>
        </div>

        <div class="section">
            <h2>✍️ Ghi chép chi tiêu</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Ngày:</label><input type="date" id="tx-date"></div>
                <div><label>Số tiền:</label><input type="number" id="tx-amt" placeholder="VNĐ" inputmode="numeric"></div>
            </div>
            <label>Hạng mục:</label>
            <select id="tx-cat">
                <optgroup label="Thiết yếu (50%)">
                    <option value="🍲 Ăn uống|Thiết yếu">🍲 Ăn uống hàng ngày</option>
                    <option value="🏠 Trọ/Điện/Nước|Thiết yếu">🏠 Tiền trọ / Điện / Nước</option>
                    <option value="⛽ Xăng xe|Thiết yếu">⛽ Xăng xe / Đi lại</option>
                </optgroup>
                <optgroup label="Cá nhân (30%)">
                    <option value="☕ Cafe/Trà sữa|Sở thích">☕ Cafe / Trà sữa</option>
                    <option value="👗 Mua sắm|Sở thích">👗 Mua sắm / Quà cáp</option>
                    <option value="🍻 Hẹn hò|Sở thích">🍻 Hẹn hò / Chơi bời</option>
                </optgroup>
                <option value="🔄 Khác|Khác">🔄 Các khoản khác</option>
            </select>
            <label>Ghi chú:</label>
            <input type="text" id="tx-note" placeholder="Ăn gì, mua gì...">
            <button onclick="addTransaction()">🚀 Ghi sổ ngay</button>
        </div>
    </div>

    <div>
        <div class="section">
            <h2>📊 Báo cáo Budget</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Tháng quyết toán:</label><input type="month" id="view-month" onchange="renderUI()"></div>
                <div><label>Ngày nhận tiếp:</label><input type="date" id="next-payday" onchange="savePayday()"></div>
            </div>

            <div class="metric-grid">
                <div class="metric-card"><div class="m-title">Thiết yếu & Cá nhân (80%)</div><div class="m-val" id="v-80">0</div></div>
                <div class="metric-card" style="border-color:var(--accent)"><div class="m-title">Số dư khả dụng</div><div class="m-val" id="v-avail" style="color:var(--accent)">0</div></div>
                <div class="metric-card"><div class="m-title" id="burn-title">Hạn mức (Còn -- ngày)</div><div class="m-val" id="val-daily">0 đ</div></div>
                <div class="metric-card"><div class="m-title">Chi tiêu hôm nay</div><div class="m-val" id="val-spent-today">0 đ</div></div>
            </div>

            <div class="progress-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem"><b>🏠 Thiết yếu (50%)</b><span id="t-needs">0/0</span></div>
                <div class="progress-bg"><div id="b-needs" class="progress-fill"></div></div>
            </div>
            <div class="progress-box">
                <div style="display:flex; justify-content:space-between; font-size:0.85rem"><b>👑 Cá nhân (30%)</b><span id="t-wants">0/0</span></div>
                <div class="progress-bg"><div id="b-wants" class="progress-fill"></div></div>
            </div>
            <div class="metric-card" style="margin-top:15px; background:var(--accent-light); border:none">
                <div class="m-title" style="color:var(--accent)">💎 Quỹ tích lũy & tiết kiệm (20%)</div><div class="m-val" id="v-invest">0</div>
            </div>
        </div>

        <div class="section">
            <h2>📋 Sao kê <button class="btn-outline btn-danger" style="color:white" onclick="clearData()">🚨 Reset</button></h2>
            <div style="max-height: 400px; overflow-y: auto;">
                <table id="tx-table"></table>
            </div>
        </div>
    </div>
</div>

<script>
    // === CẤU HÌNH CLOUD ===
    const API_URL = "DÁN_LINK_WEB_APP_CỦA_BRO_VÀO_ĐÂY"; 

    // STATE TỔNG - SẼ ĐƯỢC ĐẨY LÊN SHEET
    let data = {
        config: { title: "🌸 Tài chính Cá nhân", theme: "system", color: "pink", font: "'Quicksand', sans-serif" },
        incomes: { "Lương": 0, "Trợ cấp": 0 },
        transactions: [],
        paydays: {}
    };

    const COLORS = {
        pink: { h: "#ff69b4", l: "#ffe4e1" },
        purple: { h: "#ba55d3", l: "#f3e5f5" },
        blue: { h: "#4facfe", l: "#e3f2fd" },
        red: { h: "#ff5252", l: "#ffebee" }
    };

    const format = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n)) + ' đ';
    const getM = (d) => d.substring(0, 7);
    const getToday = () => new Date().toISOString().split('T')[0];

    // --- SYNC ENGINE ---
    async function sync(showMsg = true) {
        if(showMsg) toast("☁️ Đang đồng bộ...");
        try {
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            if(showMsg) toast("✅ Đã lưu!", true);
        } catch (e) { toast("⚠️ Lỗi kết nối!"); }
    }

    async function init() {
        toast("☁️ Đang tải dữ liệu...");
        try {
            const res = await fetch(API_URL);
            const cloudData = await res.json();
            if(cloudData.config) data = cloudData; 
            applyConfig();
            renderIncomes();
            renderUI();
        } catch (e) { toast("⚠️ Lỗi tải data!"); }
        hideToast();
    }

    // --- CONFIG & THEME ---
    function applyConfig() {
        const c = data.config;
        document.getElementById('app-title').innerText = c.title;
        document.getElementById('set-theme').value = c.theme;
        document.getElementById('set-color').value = c.color;
        document.getElementById('set-font').value = c.font;

        if(c.theme === 'system') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', c.theme);

        const root = document.documentElement;
        root.style.setProperty('--accent', COLORS[c.color].h);
        root.style.setProperty('--accent-light', COLORS[c.color].l);
        root.style.setProperty('--font-main', c.font);
    }

    function updateConfig() {
        data.config = {
            title: document.getElementById('app-title').innerText,
            theme: document.getElementById('set-theme').value,
            color: document.getElementById('set-color').value,
            font: document.getElementById('set-font').value
        };
        applyConfig();
        sync();
    }

    // --- INCOME LOGIC ---
    function renderIncomes() {
        const div = document.getElementById('income-list');
        div.innerHTML = '';
        for (let k in data.incomes) {
            div.innerHTML += `<div style="display:flex; gap:10px; margin-bottom:10px">
                <input type="text" value="${k}" onblur="renameInc('${k}', this.value)" style="flex:1; font-weight:700; border:none; background:transparent">
                <input type="number" value="${data.incomes[k]}" onchange="data.incomes['${k}']=+this.value" style="flex:1" inputmode="numeric">
                <button class="btn-outline" style="border:none; margin:0" onclick="delete data.incomes['${k}']; renderIncomes()">❌</button>
            </div>`;
        }
    }
    function addIncomeField() { const n = prompt("Tên nguồn thu:"); if(n) { data.incomes[n]=0; renderIncomes(); } }
    function renameInc(oldK, newK) { if(oldK !== newK) { data.incomes[newK] = data.incomes[oldK]; delete data.incomes[oldK]; renderIncomes(); } }
    function saveIncomes() { sync(); renderUI(); }

    // --- TRANSACTION LOGIC ---
    function addTransaction() {
        const date = document.getElementById('tx-date').value;
        const amt = +document.getElementById('tx-amt').value;
        const [cat, bucket] = document.getElementById('tx-cat').value.split('|');
        const note = document.getElementById('tx-note').value || cat;
        if(!date || !amt) return alert("Thiếu tiền hoặc ngày kìa!");
        data.transactions.push({ id: Date.now(), date, amt, cat, bucket, note });
        document.getElementById('tx-amt').value = '';
        document.getElementById('tx-note').value = '';
        renderUI();
        sync();
    }
    function delTx(id) { if(confirm("Xóa nhé?")) { data.transactions = data.transactions.filter(t => t.id !== id); renderUI(); sync(); } }
    function savePayday() { data.paydays[getM(document.getElementById('view-month').value)] = document.getElementById('next-payday').value; sync(); renderUI(); }

    // --- RENDER UI ---
    function renderUI() {
        const m = document.getElementById('view-month').value;
        const monthTx = data.transactions.filter(t => getM(t.date) === m);
        let inc = Object.values(data.incomes).reduce((a,b)=>a+b, 0);
        let n=0, w=0, o=0, tdy=0;
        monthTx.forEach(t => {
            if(t.bucket==='Thiết yếu') n+=t.amt; else if(t.bucket==='Sở thích') w+=t.amt; else o+=t.amt;
            if(t.date === getToday()) tdy+=t.amt;
        });
        const l80 = inc * 0.8, avail = l80 - (n+w+o);
        let pday = data.paydays[m] || new Date(m.split('-')[0], m.split('-')[1], 0).toISOString().split('T')[0];
        document.getElementById('next-payday').value = pday;
        let days = Math.ceil((new Date(pday) - new Date(getToday()))/(864e5)); if(days<=0) days=1;
        
        document.getElementById('v-80').innerText = format(l80);
        document.getElementById('v-avail').innerText = format(avail);
        document.getElementById('v-rem-days').innerText = `Còn ${days} ngày`;
        document.getElementById('v-daily').innerText = format(avail>0 ? avail/days : 0);
        document.getElementById('v-today').innerText = format(tdy);
        document.getElementById('v-invest').innerText = format(inc * 0.2);
        
        document.getElementById('t-needs').innerText = `${format(n)} / ${format(inc*0.5)}`;
        document.getElementById('b-needs').style.width = Math.min(n/(inc*0.5)*100, 100) + '%';
        document.getElementById('t-wants').innerText = `${format(w)} / ${format(inc*0.3)}`;
        document.getElementById('b-wants').style.width = Math.min(w/(inc*0.3)*100, 100) + '%';

        const table = document.getElementById('tx-table'); table.innerHTML = '';
        monthTx.sort((a,b)=>new Date(b.date)-new Date(a.date)).forEach(t => {
            table.innerHTML += `<tr>
                <td><b>${t.date.split('-')[2]}</b></td>
                <td>${t.cat.split(' ')[0]}<br><small>${t.note}</small></td>
                <td style="text-align:right"><b>${format(t.amt)}</b></td>
                <td><button class="btn-outline" style="border:none; padding:0" onclick="delTx(${t.id})">❌</button></td>
            </tr>`;
        });
    }

    // --- HELPER ---
    function openModal() { document.getElementById('settings-modal').classList.add('show'); }
    function closeModal(e) { if(!e || e.target.id === 'settings-modal') document.getElementById('settings-modal').classList.remove('show'); }
    function toast(m, s) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); if(s) setTimeout(hideToast, 2000); }
    function hideToast() { document.getElementById('toast').classList.remove('show'); }
    function clearData() { if(confirm("Xóa hết thật à?")) { data.transactions=[]; renderUI(); sync(); } }

    window.onload = () => {
        document.getElementById('view-month').value = getM(getToday());
        document.getElementById('tx-date').value = getToday();
        init();
    };
</script>
</body>
</html>
