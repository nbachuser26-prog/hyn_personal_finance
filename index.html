<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App For My Queen 👑</title>
    <style>
        :root {
            --bg: #0e1117; --panel: #262730; --text: #fafafa;
            --accent: #ff4b4b; --border: #464b54; --success: #2e7d32;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 1100px; margin: auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
        
        .section { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--accent); font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        
        label { display: block; margin: 10px 0 5px; font-size: 0.85rem; opacity: 0.8; }
        input, select, button { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #0e1117; color: white; box-sizing: border-box; }
        button { cursor: pointer; background: var(--accent); border: none; font-weight: bold; margin-top: 15px; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; }

        .metric-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .metric-card { background: #0e1117; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
        .m-title { font-size: 0.75rem; color: #aaa; margin-bottom: 5px; }
        .m-val { font-size: 1.1rem; font-weight: bold; }
        
        .progress-box { margin: 15px 0; }
        .progress-bg { height: 8px; background: #444; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; width: 0%; transition: 0.5s; }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 15px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
        th { color: #888; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            visibility: hidden;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <p style="margin-top:15px;">Đang đồng bộ với Cloud...</p>
</div>

<div class="container">
    <div>
        <div class="section">
            <h2>💰 Nguồn Thu (Income)</h2>
            <div id="income-inputs">
                <label>Trợ cấp Phụ huynh:</label>
                <input type="number" class="inc-val" data-key="Trợ cấp Phụ huynh" value="0">
                <label>Tiền dạy Gia sư:</label>
                <input type="number" class="inc-val" data-key="Tiền dạy Gia sư" value="0">
                <label>Nguồn khác:</label>
                <input type="number" class="inc-val" data-key="Nguồn khác" value="0">
            </div>
            <button onclick="saveData()">Lưu & Đồng bộ Thu Nhập</button>
        </div>

        <div class="section">
            <h2>✍️ Ghi chép Chi tiêu</h2>
            <label>Ngày:</label>
            <input type="date" id="tx-date">
            <label>Số tiền (VNĐ):</label>
            <input type="number" id="tx-amt" placeholder="VD: 50000">
            <label>Hạng mục:</label>
            <select id="tx-cat">
                <optgroup label="Thiết yếu (50%)">
                    <option value="🍲 Ăn uống|Thiết yếu">🍲 Ăn uống hàng ngày</option>
                    <option value="🏠 Trọ/Điện/Nước|Thiết yếu">🏠 Tiền trọ / Điện / Nước</option>
                    <option value="⛽ Đi lại/Xăng|Thiết yếu">⛽ Đi lại / Xăng xe</option>
                </optgroup>
                <optgroup label="Sở thích (30%)">
                    <option value="☕ Cafe/Trà sữa|Sở thích">☕ Cafe / Trà sữa</option>
                    <option value="🍻 Đi chơi/Hẹn hò|Sở thích">🍻 Đi chơi / Hẹn hò</option>
                    <option value="👗 Mua sắm|Sở thích">👗 Mua sắm quần áo</option>
                </optgroup>
                <optgroup label="Khác">
                    <option value="🔄 Chi hộ/Trả nợ|Khác">🔄 Chi hộ / Trả nợ</option>
                    <option value="🎁 Quà cáp|Sở thích">🎁 Quà cáp / Biếu tặng</option>
                </optgroup>
            </select>
            <label>Ghi chú:</label>
            <input type="text" id="tx-note" placeholder="VD: Ăn bún chả...">
            <button onclick="addTransaction()">Ghi sổ Chi Tiêu</button>
        </div>
    </div>

    <div>
        <div class="section">
            <h2>📊 Báo Cáo & Budget</h2>
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Tháng quyết toán:</label>
                    <input type="month" id="view-month" onchange="renderUI()">
                </div>
                <div style="flex: 1;">
                    <label>🎯 Ngày nhận tiền tiếp:</label>
                    <input type="date" id="next-payday" onchange="savePaydayOnly()">
                </div>
            </div>

            <div class="metric-grid">
                <div class="metric-card">
                    <div class="m-title">Số dư Khả dụng</div>
                    <div class="m-val" id="val-avail">0 đ</div>
                </div>
                <div class="metric-card">
                    <div class="m-title" id="burn-title">Hạn mức Daily</div>
                    <div class="m-val" id="val-daily">0 đ</div>
                </div>
            </div>

            <div class="progress-box">
                <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
                    <span>🏠 Thiết yếu (50%)</span><span id="txt-needs">0/0</span>
                </div>
                <div class="progress-bg"><div id="bar-needs" class="progress-fill" style="background: #2196f3;"></div></div>
            </div>

            <div class="progress-box">
                <div style="display:flex; justify-content: space-between; font-size: 0.8rem;">
                    <span>🎸 Sở thích (30%)</span><span id="txt-wants">0/0</span>
                </div>
                <div class="progress-bg"><div id="bar-wants" class="progress-fill" style="background: #ff9800;"></div></div>
            </div>

            <div class="metric-card" style="margin-top: 10px; border-color: #2e7d32;">
                <div class="m-title" style="color:#4caf50">💎 Quỹ Tích lũy (20%)</div>
                <div class="m-val" id="val-invest">0 đ</div>
            </div>

            <h2>📋 Sao kê tháng này</h2>
            <table>
                <thead><tr><th>Ngày</th><th>Mục</th><th>Tiền</th></tr></thead>
                <tbody id="tx-history"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // === CẤU HÌNH ===
    const API_URL = "https://script.google.com/macros/s/AKfycbwmv_pzJ6Q9Md_eAxtnQDhI9G6OD9j2eSz8gBbhGCueyyD6wS8CgnuZiNFv2pV6LkedqQ/exec"; 

    let state = {
        incomes: {},
        transactions: [],
        paydays: {}
    };

    const formatVND = (n) => new Intl.NumberFormat('vi-VN').format(Math.round(n)) + ' đ';
    const getMonthKey = (d) => d.substring(0, 7);
    const todayStr = () => new Date().toISOString().split('T')[0];

    async function loadData() {
        showLoading(true);
        try {
            const res = await fetch(API_URL);
            state = await res.json();
            if (!state.incomes) state.incomes = {};
            if (!state.transactions) state.transactions = [];
            if (!state.paydays) state.paydays = {};
            
            // Đổ dữ liệu vào input thu nhập
            document.querySelectorAll('.inc-val').forEach(input => {
                input.value = state.incomes[input.dataset.key] || 0;
            });
            
            renderUI();
        } catch (e) { alert("Lỗi tải dữ liệu từ Cloud!"); }
        showLoading(false);
    }

    async function saveData() {
        showLoading(true);
        // Lấy dữ liệu từ input thu nhập
        document.querySelectorAll('.inc-val').forEach(input => {
            state.incomes[input.dataset.key] = parseFloat(input.value) || 0;
        });

        try {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(state)
            });
            renderUI();
        } catch (e) { alert("Lỗi lưu dữ liệu!"); }
        showLoading(false);
    }

    function addTransaction() {
        const date = document.getElementById('tx-date').value;
        const amt = parseFloat(document.getElementById('tx-amt').value);
        const [cat, bucket] = document.getElementById('tx-cat').value.split('|');
        const note = document.getElementById('tx-note').value || cat;

        if (!date || !amt) return alert("Vui lòng nhập đủ ngày và số tiền!");

        state.transactions.push({ date, amt, cat, bucket, note });
        document.getElementById('tx-amt').value = '';
        document.getElementById('tx-note').value = '';
        saveData();
    }

    function savePaydayOnly() {
        const m = document.getElementById('view-month').value;
        state.paydays[m] = document.getElementById('next-payday').value;
        saveData();
    }

    function renderUI() {
        const curMonth = document.getElementById('view-month').value;
        const monthTx = state.transactions.filter(t => getMonthKey(t.date) === curMonth);
        
        let totalInc = Object.values(state.incomes).reduce((a,b) => a+b, 0);
        let spentNeeds = 0, spentWants = 0, spentOther = 0;
        let spentToday = 0;

        monthTx.forEach(t => {
            if (t.bucket === 'Thiết yếu') spentNeeds += t.amt;
            else if (t.bucket === 'Sở thích') spentWants += t.amt;
            else spentOther += t.amt;
            if (t.date === todayStr()) spentToday += t.amt;
        });

        // Tính toán Budget
        const limitNeeds = totalInc * 0.5;
        const limitWants = totalInc * 0.3;
        const limit80 = totalInc * 0.8;
        const avail = limit80 - (spentNeeds + spentWants + spentOther);

        // Daily Burn Rate
        let payday = state.paydays[curMonth];
        if (!payday) {
            const [y, m] = curMonth.split('-');
            payday = new Date(y, m, 0).toISOString().split('T')[0];
        }
        document.getElementById('next-payday').value = payday;

        const diffTime = new Date(payday) - new Date(todayStr());
        let remDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        if (remDays <= 0) remDays = 1;

        const dailyLimit = avail > 0 ? Math.floor(avail / remDays / 1000) * 1000 : 0;

        // Cập nhật giao diện
        document.getElementById('val-avail').innerText = formatVND(avail);
        document.getElementById('val-daily').innerText = formatVND(dailyLimit);
        document.getElementById('burn-title').innerText = `Hạn mức (Còn ${remDays} ngày)`;
        
        document.getElementById('txt-needs').innerText = `${formatVND(spentNeeds)} / ${formatVND(limitNeeds)}`;
        document.getElementById('bar-needs').style.width = Math.min((spentNeeds/limitNeeds)*100 || 0, 100) + '%';
        
        document.getElementById('txt-wants').innerText = `${formatVND(spentWants)} / ${formatVND(limitWants)}`;
        document.getElementById('bar-wants').style.width = Math.min((spentWants/limitWants)*100 || 0, 100) + '%';
        
        document.getElementById('val-invest').innerText = formatVND(totalInc * 0.2);

        // Render Table
        const tbody = document.getElementById('tx-history');
        tbody.innerHTML = '';
        monthTx.reverse().forEach(t => {
            tbody.innerHTML += `<tr><td>${t.date.split('-')[2]}</td><td>${t.cat}</td><td>${formatVND(t.amt)}</td></tr>`;
        });
    }

    function showLoading(show) {
        document.getElementById('loading-overlay').style.visibility = show ? 'visible' : 'hidden';
    }

    // Khởi tạo
    window.onload = () => {
        document.getElementById('view-month').value = getMonthKey(todayStr());
        document.getElementById('tx-date').value = todayStr();
        loadData();
    };
</script>

</body>
</html>
